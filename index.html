<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pet Adoption</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-3">
            <div class="btn-group">
                <button id="cat" class="btn btn-success mx-2">Cats</button>
                <button id="dog" class="btn btn-primary mx-2">Dogs</button>
                <button id="dino" class="btn btn-warning mx-2">Dinos</button>
            </div>
        </div>
    
        <form id="add-pet-form" class="mt-3">
            <label for="name">
                <input type="text" id="name" placeholder="Pet's Name" required>
            </label>
            <label for="color">
                <input type="text" id="color" placeholder="Pet's Color" required>
            </label>
            <label for="specialSkill">
                <input type="text" id="specialSkill" placeholder="Special Skill" required>
            </label>
            <label for="type">
                <input type="text" id="type" placeholder="Pet's Type (e.g., Dog)" required>
            </label>
            <label for="imageUrl">
                <input type="url" id="imageUrl" placeholder="Image URL" required>
            </label>
            <button class="btn btn-success" type="submit">Add Pet</button>
        </form>
    
        <div id="pets-container" class="card-deck mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
